{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2>Create Company Profile</h2>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-info">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Create Company
        </button>
    </form>
</div>
{% endblock %}
