{% extends 'base.html' %}
{% block title %}AI Job Description Generator{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4>✍️ Generate Job Description</h4>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Senior Django Developer"
                            value="{{ form_data.title|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Required Skills</label>
                        <input type="text" name="skills" class="form-control"
                            placeholder="Python, Django, PostgreSQL, REST API"
                            value="{{ form_data.skills|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Experience Level</label>
                        <select name="experience" class="form-select">
                            <option value="Fresher">Fresher</option>
                            <option value="1-2 Years">1-2 Years</option>
                            <option value="3-5 Years">3-5 Years</option>
                            <option value="5+ Years">5+ Years</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Type</label>
                        <select name="job_type" class="form-select">
                            <option value="Full Time">Full Time</option>
                            <option value="Part Time">Part Time</option>
                            <option value="Remote">Remote</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" placeholder="Bangalore, India"
                            value="{{ form_data.location|default:'' }}">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        🤖 Generate with AI
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Generated Result -->
    {% if generated %}
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between mb-3">
                    <h4>Generated Job Description</h4>
                    <button class="btn btn-sm btn-outline-secondary" onclick="copyToClipboard()">Copy</button>
                </div>
                <div id="jd-content" style="white-space: pre-wrap;">{{ generated }}</div>
            </div>
        </div>
    </div>
    {% endif %}
</div>

<script>
    function copyToClipboard() {
        const text = document.getElementById('jd-content').innerText;
        navigator.clipboard.writeText(text);
        alert('Copied to clipboard!');
    }
</script>
{% endblock %}
